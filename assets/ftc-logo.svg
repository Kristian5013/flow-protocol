<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="coinGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9"/>
      <stop offset="50%" style="stop-color:#2E5A8B"/>
      <stop offset="100%" style="stop-color:#1A3A5C"/>
    </linearGradient>
    <linearGradient id="innerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5BA3E8"/>
      <stop offset="100%" style="stop-color:#3B7BBF"/>
    </linearGradient>
  </defs>

  <!-- Outer circle (coin edge) -->
  <circle cx="32" cy="32" r="30" fill="url(#coinGradient)" stroke="#1A3A5C" stroke-width="2"/>

  <!-- Inner circle -->
  <circle cx="32" cy="32" r="26" fill="url(#innerGradient)"/>

  <!-- Pixel-style letter F -->
  <g fill="#FFFFFF">
    <!-- Vertical bar of F -->
    <rect x="22" y="14" width="4" height="4"/>
    <rect x="22" y="18" width="4" height="4"/>
    <rect x="22" y="22" width="4" height="4"/>
    <rect x="22" y="26" width="4" height="4"/>
    <rect x="22" y="30" width="4" height="4"/>
    <rect x="22" y="34" width="4" height="4"/>
    <rect x="22" y="38" width="4" height="4"/>
    <rect x="22" y="42" width="4" height="4"/>
    <rect x="22" y="46" width="4" height="4"/>

    <!-- Top horizontal bar of F -->
    <rect x="26" y="14" width="4" height="4"/>
    <rect x="30" y="14" width="4" height="4"/>
    <rect x="34" y="14" width="4" height="4"/>
    <rect x="38" y="14" width="4" height="4"/>

    <!-- Middle horizontal bar of F -->
    <rect x="26" y="30" width="4" height="4"/>
    <rect x="30" y="30" width="4" height="4"/>
    <rect x="34" y="30" width="4" height="4"/>
  </g>

  <!-- Subtle shine effect -->
  <ellipse cx="24" cy="20" rx="8" ry="6" fill="rgba(255,255,255,0.15)"/>
</svg>