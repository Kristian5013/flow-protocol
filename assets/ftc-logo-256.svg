<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="coinGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9"/>
      <stop offset="50%" style="stop-color:#2E5A8B"/>
      <stop offset="100%" style="stop-color:#1A3A5C"/>
    </linearGradient>
    <linearGradient id="innerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5BA3E8"/>
      <stop offset="100%" style="stop-color:#3B7BBF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Outer circle (coin edge) with shadow -->
  <circle cx="128" cy="128" r="120" fill="url(#coinGradient)" stroke="#1A3A5C" stroke-width="4" filter="url(#shadow)"/>

  <!-- Inner circle -->
  <circle cx="128" cy="128" r="104" fill="url(#innerGradient)"/>

  <!-- Ring detail -->
  <circle cx="128" cy="128" r="96" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>

  <!-- Pixel-style letter F (4x scale = 16px blocks) -->
  <g fill="#FFFFFF">
    <!-- Vertical bar of F -->
    <rect x="88" y="56" width="16" height="16" rx="2"/>
    <rect x="88" y="72" width="16" height="16" rx="2"/>
    <rect x="88" y="88" width="16" height="16" rx="2"/>
    <rect x="88" y="104" width="16" height="16" rx="2"/>
    <rect x="88" y="120" width="16" height="16" rx="2"/>
    <rect x="88" y="136" width="16" height="16" rx="2"/>
    <rect x="88" y="152" width="16" height="16" rx="2"/>
    <rect x="88" y="168" width="16" height="16" rx="2"/>
    <rect x="88" y="184" width="16" height="16" rx="2"/>

    <!-- Top horizontal bar of F -->
    <rect x="104" y="56" width="16" height="16" rx="2"/>
    <rect x="120" y="56" width="16" height="16" rx="2"/>
    <rect x="136" y="56" width="16" height="16" rx="2"/>
    <rect x="152" y="56" width="16" height="16" rx="2"/>

    <!-- Middle horizontal bar of F -->
    <rect x="104" y="120" width="16" height="16" rx="2"/>
    <rect x="120" y="120" width="16" height="16" rx="2"/>
    <rect x="136" y="120" width="16" height="16" rx="2"/>
  </g>

  <!-- Subtle shine effect -->
  <ellipse cx="96" cy="80" rx="32" ry="24" fill="rgba(255,255,255,0.12)"/>
</svg>